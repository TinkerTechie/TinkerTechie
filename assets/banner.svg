<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>

    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#79C0FF"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="48" rx="18" fill="#161B22"/>
  <line x1="0" y1="48" x2="1200" y2="48" stroke="#30363D"/>

  <circle cx="30" cy="24" r="7" fill="#FF5F56"/>
  <circle cx="55" cy="24" r="7" fill="#FFBD2E"/>
  <circle cx="80" cy="24" r="7" fill="#27C93F"/>

  <text x="1110" y="30" fill="#8B949E" font-size="16"
        font-family="monospace" text-anchor="end">AparnaOS</text>

  <text x="60" y="100" fill="#58A6FF"
        font-size="42"
        font-weight="700"
        filter="url(#glow)"
        font-family="monospace">AparnaOS</text>

  <rect x="340" y="68" width="9" height="40" fill="#58A6FF">
      <animate attributeName="opacity"
               values="1;0;1"
               dur="1s"
               repeatCount="indefinite"/>
  </rect>

  <text x="60" y="138"
        fill="#8B949E"
        font-size="20"
        font-family="monospace">
AI Engineer • Multi-Agent Systems • Full-Stack Developer • Data Science
  </text>

  <text x="60" y="180"
        fill="#3FB950"
        font-size="19"
        font-family="monospace">
visitor@github:~$
  </text>

  <text x="250" y="180"
        fill="#F0F6FC"
        font-size="19"
        font-family="monospace">boot</text>

  <rect x="60" y="205"
        width="650"
        height="12"
        rx="6"
        fill="#30363D"/>

  <rect x="60" y="205"
        width="650"
        height="12"
        rx="6"
        fill="url(#bar)">
      <animate attributeName="width"
               from="0"
               to="650"
               dur="2.2s"
               fill="freeze"/>
  </rect>

  <text x="60" y="250" fill="#8B949E" font-size="16" font-family="monospace">
Loading LangGraph.....................OK
  </text>

  <text x="60" y="275" fill="#8B949E" font-size="16" font-family="monospace">
Connecting Neo4j......................OK
  </text>

  <text x="60" y="300" fill="#8B949E" font-size="16" font-family="monospace">
Connecting Qdrant.....................OK
  </text>

  <rect x="760" y="78"
        width="380"
        height="185"
        rx="12"
        fill="#0D1117"
        stroke="#30363D"/>

  <text x="785" y="105"
        fill="#58A6FF"
        font-size="18"
        font-family="monospace">
SYSTEM STATUS
  </text>

  <circle cx="790" cy="130" r="5" fill="#3FB950"/>
  <text x="805" y="135" fill="#F0F6FC" font-size="15" font-family="monospace">AI Runtime</text>

  <circle cx="790" cy="160" r="5" fill="#3FB950"/>
  <text x="805" y="165" fill="#F0F6FC" font-size="15" font-family="monospace">LangGraph</text>

  <circle cx="790" cy="190" r="5" fill="#3FB950"/>
  <text x="805" y="195" fill="#F0F6FC" font-size="15" font-family="monospace">Neo4j</text>

  <circle cx="790" cy="220" r="5" fill="#3FB950"/>
  <text x="805" y="225" fill="#F0F6FC" font-size="15" font-family="monospace">Qdrant</text>

  <circle cx="790" cy="250" r="5" fill="#3FB950"/>
  <text x="805" y="255" fill="#F0F6FC" font-size="15" font-family="monospace">Projects Ready</text>
</svg>
